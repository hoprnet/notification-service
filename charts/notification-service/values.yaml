# Default values for notification-service.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# This will set the replicaset count more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
replicaCount: 1

# This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  repository: europe-west3-docker.pkg.dev/hoprassociation/docker-images/notification-service
  # This sets the pull policy for images.
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

# This is for the secrets for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []
# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

# This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  # This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
  port: 8080

# Ingress — disabled by default; enable and configure for your cluster's ingress controller.
# https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: false
  className: "nginx"
  annotations: {}
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: notification-service.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: notification-service-tls
  #    hosts:
  #      - notification-service.local

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# This is to setup the liveness and readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
livenessProbe:
  httpGet:
    path: /healthz
    port: http
readinessProbe:
  httpGet:
    path: /healthz
    port: http

# This section is for setting up autoscaling more information can be found here: https://kubernetes.io/docs/concepts/workloads/autoscaling/
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}

# Keep alert management platform configuration.
# KEEP_BASE_URL is used to build per-alert deep-links in Zulip messages.
# Example: https://incidents.staging.hoprnet.link
keep:
  # Base URL of the Keep instance (no trailing slash).
  baseUrl: ""

# Graylog log search configuration.
# GRAYLOG_BASE_URL must include the saved-search path and trailing ?q=
# Example: https://graylog.staging.hoprnet.link/search/<id>?q=
# Leave empty to omit the Graylog link from Zulip messages.
graylog:
  baseUrl: ""

# Logical environment name injected into the pod as ENVIRONMENT_NAME.
# Used to build the Zulip topic: alerts-<environmentName>.
# Example: staging, production
environment:
  name: ""

# Zulip output configuration.
# Non-sensitive values (enabled, host, defaultStream, namespaceStreams,
# messageTtlDays, requestTimeoutSecs) are stored in the ConfigMap and injected
# as environment variables.
# Sensitive credentials (email, apiKey) are stored in the Secret.
zulip:
  # Set to false to disable all Zulip API calls (dry-run mode). Defaults to true.
  enabled: true
  # Days before an idle fingerprint→message-ID entry is evicted from the store.
  # After eviction the next alert for that fingerprint opens a fresh Zulip message.
  messageTtlDays: 7
  # Timeout in seconds for outbound Zulip HTTP requests. Defaults to 10.
  requestTimeoutSecs: 10
  # Zulip bot e-mail address (used for API authentication).
  email: ""
  # Zulip bot API key.
  apiKey: ""
  # Zulip server hostname, e.g. yourorg.zulipchat.com
  host: ""
  # Stream used when the alert namespace has no explicit mapping.
  defaultStream: ""
  # Map of Kubernetes namespace → Zulip stream name.
  # Alerts from unlisted namespaces fall back to defaultStream.
  # Example:
  #   namespaceStreams:
  #     monitoring: devops-alerts
  #     production: prod-alerts
  namespaceStreams: {}

rust:
  # RUST_LOG sets the log level for the notification service. Defaults to "info".
  log: "info"
  # RUST_BACKTRACE sets the backtrace mode for the notification service. Defaults to "full".
  backtrace: "full"